<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Resume Analyzer</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>AI Resume Analyzer 🚀</h1>

<div class="main">

    <div class="card">

        <p>Upload your resume and get ATS score instantly</p>

        <!-- FILE INPUT -->
        <input type="file" id="fileInput">

        <!-- BUTTON -->
        <button onclick="uploadResume()">Analyze Resume</button>

        <!-- RESULT BOX -->
        <div class="result">

            <h3>ATS Score</h3>

            <!-- GRAPH -->
            <canvas id="atsChart" width="250" height="250"></canvas>

            <!-- SCORE -->
            <div class="circle">
                <span id="score">0%</span>
            </div>

            <!-- OUTPUT -->
            <pre id="output">Waiting for upload...</pre>

            <!-- DOWNLOAD -->
            <button onclick="downloadReport()">Download Report</button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
